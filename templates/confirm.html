{% extends 'base.html' %}
{% block title %}Delete Expense{% endblock %}

{% block content %}
<style>
  .confirm-wrap {
    max-width: 460px;
    margin: 3rem auto;
    animation: fadeUp 0.5s ease;
  }
  .confirm-card {
    background: #0f0f1e;
    border: 1px solid #f472b625;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .confirm-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--pink), #fb7185);
  }
  .del-icon {
    width: 68px; height: 68px;
    border-radius: 20px;
    background: #f472b615;
    border: 1px solid #f472b630;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--pink);
    margin: 0 auto 1.3rem;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 #f472b630; }
    50%      { box-shadow: 0 0 0 10px #f472b600; }
  }
  .confirm-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.35rem; font-weight: 700;
    color: var(--text); margin-bottom: 0.6rem;
  }
  .confirm-sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 0.5rem; }
  .expense-name {
    display: inline-block;
    padding: 5px 16px;
    background: #f472b612;
    border: 1px solid #f472b630;
    border-radius: 50px;
    font-size: 13.5px;
    color: var(--pink);
    font-weight: 500;
    margin: 0.5rem 0 1.5rem;
  }
  .confirm-actions {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .del-confirm-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 11px 28px;
    background: linear-gradient(135deg, #f472b6, #fb7185);
    color: #fff; border: none; border-radius: 50px;
    font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    position: relative;
  }
  .del-confirm-btn::after {
    content: '';
    position: absolute; inset: -2px; border-radius: 54px;
    background: linear-gradient(135deg, #f472b6, #fb7185);
    filter: blur(10px); opacity: 0.3; z-index: -1;
  }
  .del-confirm-btn:hover { opacity: 0.88; transform: translateY(-2px); }
  .back-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 11px 24px;
    background: #ffffff07;
    color: var(--muted); border: 1px solid var(--border);
    border-radius: 50px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .back-btn:hover { background: #ffffff0f; color: var(--text); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="confirm-wrap">
  <div class="confirm-card">
    <div class="del-icon"><i class="ti ti-trash"></i></div>
    <div class="confirm-title">Delete Expense?</div>
    <div class="confirm-sub">Yeh action undo nahi hoga!</div>
    <div class="expense-name">{{ object.name }} — ₹{{ object.amount }}</div>

    <div class="confirm-actions">
      <a href="{% url 'expense_list' %}" class="back-btn">
        <i class="ti ti-arrow-left"></i> Cancel
      </a>
      <form method="POST" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="del-confirm-btn">
          <i class="ti ti-trash"></i> Haan, Delete Karo
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
