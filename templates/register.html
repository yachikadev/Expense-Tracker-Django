<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
</head>
<body>
    <form method="POST">
      {% csrf_token %}
  
     {% if form.errors %}
    {% for field in form %}
        {% for error in field.errors %}
                {{ error }}
                {% endfor %}
    {% endfor %}
{% endif %}
            {% for field in form %}
            {{field.lable}}
            <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"  >         
            {% if field.help_text %}
            {{field.help_text}}
            {% endif %}
            {% endfor %}
             <button type="submit"> Register </button>
            </form>
            <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">login</a>
</body>
</html>
